<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="할 일" />
  <meta name="theme-color" content="#F8F7F4" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />
  <title>할 일</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #F8F7F4;
      --surface: #FFFFFF;
      --text: #1C1C1E;
      --sub: #8E8E93;
      --accent: #5B8A6E;
      --accent-light: #EAF2EE;
      --done: #C7C7CC;
      --danger: #FF3B30;
      --border: #E5E5EA;
      --shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      color: var(--text);
    }

    body {
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
    }

    /* Header */
    header {
      padding: 56px 24px 8px;
      background: var(--bg);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .count {
      font-size: 14px;
      color: var(--sub);
      margin-top: 4px;
      font-weight: 400;
    }

    /* Filter tabs */
    .tabs {
      display: flex;
      gap: 8px;
      padding: 16px 24px 12px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      background: var(--surface);
      color: var(--sub);
    }
    .tab.active {
      background: var(--accent);
      color: white;
    }

    /* List */
    main {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px;
      padding-bottom: 100px;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      transition: opacity 0.2s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item.done {
      opacity: 0.5;
    }

    /* Checkbox */
    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
      background: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    .check-btn.checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    .check-btn.checked::after {
      content: '';
      width: 6px;
      height: 10px;
      border: 2px solid white;
      border-top: none;
      border-left: none;
      transform: rotate(42deg) translateY(-1px);
    }

    /* Text */
    .todo-text {
      flex: 1;
      font-size: 16px;
      line-height: 1.4;
      word-break: break-word;
      cursor: pointer;
    }
    .done .todo-text {
      text-decoration: line-through;
      color: var(--done);
    }

    /* Edit mode */
    .todo-edit-input {
      flex: 1;
      font-size: 16px;
      border: none;
      outline: none;
      background: transparent;
      font-family: inherit;
      color: var(--text);
      padding: 0;
    }

    /* Delete */
    .delete-btn {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      background: #FF3B3015;
      color: var(--danger);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .todo-item:hover .delete-btn,
    .todo-item:focus-within .delete-btn {
      opacity: 1;
    }

    /* Empty state */
    .empty {
      text-align: center;
      padding: 80px 24px;
      color: var(--sub);
    }
    .empty .icon {
      font-size: 48px;
      margin-bottom: 12px;
    }
    .empty p {
      font-size: 16px;
    }

    /* Input area */
    .input-area {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: rgba(248, 247, 244, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
    }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-row input {
      flex: 1;
      height: 46px;
      border-radius: 23px;
      border: 1.5px solid var(--border);
      padding: 0 18px;
      font-size: 16px;
      font-family: inherit;
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .input-row input:focus {
      border-color: var(--accent);
    }
    .input-row input::placeholder {
      color: var(--sub);
    }

    .add-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--accent);
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.15s;
    }
    .add-btn:active {
      transform: scale(0.93);
    }
    .add-btn:disabled {
      background: var(--border);
    }

    /* Section label */
    .section-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--sub);
      padding: 16px 8px 8px;
    }
  </style>
</head>
<body>

<header>
  <h1>할 일</h1>
  <p class="count" id="count"></p>
</header>

<div class="tabs">
  <button class="tab active" data-filter="all">전체</button>
  <button class="tab" data-filter="active">남은 것</button>
  <button class="tab" data-filter="done">완료</button>
</div>

<main>
  <ul class="todo-list" id="todo-list"></ul>
</main>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="new-todo" placeholder="새로운 할 일" maxlength="100" />
    <button class="add-btn" id="add-btn" disabled>+</button>
  </div>
</div>

<script>
  let todos = JSON.parse(localStorage.getItem('todos') || '[]');
  let filter = 'all';
  let editingId = null;

  const listEl = document.getElementById('todo-list');
  const countEl = document.getElementById('count');
  const input = document.getElementById('new-todo');
  const addBtn = document.getElementById('add-btn');

  function save() {
    localStorage.setItem('todos', JSON.stringify(todos));
  }

  function getFiltered() {
    if (filter === 'active') return todos.filter(t => !t.done);
    if (filter === 'done')   return todos.filter(t => t.done);
    return todos;
  }

  function render() {
    const filtered = getFiltered();
    const remaining = todos.filter(t => !t.done).length;
    countEl.textContent = remaining > 0 ? `${remaining}개 남음` : todos.length > 0 ? '모두 완료 🎉' : '';

    if (filtered.length === 0) {
      listEl.innerHTML = `
        <li class="empty">
          <div class="icon">${filter === 'done' ? '✅' : '📋'}</div>
          <p>${filter === 'done' ? '완료한 항목이 없어요' : '할 일을 추가해보세요'}</p>
        </li>`;
      return;
    }

    listEl.innerHTML = filtered.map(todo => `
      <li class="todo-item ${todo.done ? 'done' : ''}" data-id="${todo.id}">
        <button class="check-btn ${todo.done ? 'checked' : ''}" data-action="toggle" aria-label="완료 토글"></button>
        ${editingId === todo.id
          ? `<input class="todo-edit-input" value="${escHtml(todo.text)}" data-action="editinput" autofocus />`
          : `<span class="todo-text" data-action="edit">${escHtml(todo.text)}</span>`
        }
        <button class="delete-btn" data-action="delete" aria-label="삭제">✕</button>
      </li>
    `).join('');

    // Focus edit input if needed
    if (editingId) {
      const ei = listEl.querySelector('.todo-edit-input');
      if (ei) { ei.focus(); ei.setSelectionRange(ei.value.length, ei.value.length); }
    }
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function addTodo() {
    const text = input.value.trim();
    if (!text) return;
    todos.unshift({ id: Date.now(), text, done: false });
    input.value = '';
    addBtn.disabled = true;
    save();
    filter = 'all';
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.filter === 'all'));
    render();
  }

  // Delegated events on list
  listEl.addEventListener('click', e => {
    const item = e.target.closest('[data-id]');
    if (!item) return;
    const id = Number(item.dataset.id);
    const action = e.target.dataset.action;

    if (action === 'toggle') {
      todos = todos.map(t => t.id === id ? {...t, done: !t.done} : t);
      save(); render();
    } else if (action === 'delete') {
      todos = todos.filter(t => t.id !== id);
      save(); render();
    } else if (action === 'edit' && editingId !== id) {
      editingId = id;
      render();
    }
  });

  listEl.addEventListener('keydown', e => {
    if (!e.target.matches('.todo-edit-input')) return;
    const item = e.target.closest('[data-id]');
    const id = Number(item.dataset.id);
    if (e.key === 'Enter') {
      const val = e.target.value.trim();
      if (val) todos = todos.map(t => t.id === id ? {...t, text: val} : t);
      editingId = null;
      save(); render();
    } else if (e.key === 'Escape') {
      editingId = null; render();
    }
  });

  listEl.addEventListener('blur', e => {
    if (!e.target.matches('.todo-edit-input')) return;
    const item = e.target.closest('[data-id]');
    const id = Number(item.dataset.id);
    const val = e.target.value.trim();
    if (val) todos = todos.map(t => t.id === id ? {...t, text: val} : t);
    editingId = null;
    save(); render();
  }, true);

  // Input
  input.addEventListener('input', () => { addBtn.disabled = !input.value.trim(); });
  input.addEventListener('keydown', e => { if (e.key === 'Enter') addTodo(); });
  addBtn.addEventListener('click', addTodo);

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      filter = tab.dataset.filter;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      editingId = null;
      render();
    });
  });

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }

  render();
</script>
</body>
</html>
